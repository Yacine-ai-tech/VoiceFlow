# Railway deploy descriptor. The Dockerfile CMD binds to the platform-injected $PORT,
# so no startCommand override is needed here. Works the same on Render/Fly (Dockerfile build).
[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
