<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VoiceFlow Demo</title>
<style>
body { background:#0f172a; color:#f1f5f9; font:14px/1.5 system-ui; margin:0; padding:32px; }
h1 { margin:0 0 4px; }
.sub { color:#94a3b8; margin-bottom:24px; }
button { background:#6366f1; color:#fff; border:none; border-radius:8px; padding:16px 32px; font-size:16px; cursor:pointer; }
button.recording { background:#ef4444; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.6} }
button:disabled { opacity:.5; cursor:wait; }
.controls { margin:16px 0; display:flex; gap:12px; }
.radios label { background:#1e293b; padding:6px 14px; border-radius:20px; margin-right:8px; cursor:pointer; }
.radios input { margin-right:6px; }
.row { display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-top:24px; }
.box { background:#1e293b; border:1px solid #334155; padding:16px; border-radius:8px; min-height:240px; }
pre { white-space:pre-wrap; word-break:break-word; }
.countdown { font-size:48px; color:#a5b4fc; margin:16px 0; }
</style>
</head>
<body>
<h1>VoiceFlow</h1>
<div class="sub">Speech → structured intelligence. Click to record.</div>

<div class="radios">
  <label><input type="radio" name="analysis" value="meeting" checked>Meeting</label>
  <label><input type="radio" name="analysis" value="sales_call">Sales Call</label>
  <label><input type="radio" name="analysis" value="general">General</label>
</div>

<div class="controls">
  <button id="rec">🎙️ Click to record</button>
  <button id="sample1">Try sample meeting</button>
</div>
<div id="countdown" class="countdown"></div>

<div class="row">
  <div class="box"><h3>Transcript</h3><pre id="transcript">—</pre></div>
  <div class="box"><h3>Analysis JSON</h3><pre id="analysis">—</pre></div>
</div>

<script>
const btn = document.getElementById('rec');
const cd = document.getElementById('countdown');
let recorder, chunks = [], recording = false;

btn.addEventListener('click', async () => {
  if (recording) {
    recorder.stop();
    return;
  }
  // 3-second countdown
  for (let i = 3; i > 0; i--) { cd.textContent = i; await new Promise(r=>setTimeout(r,800)); }
  cd.textContent = '';
  const stream = await navigator.mediaDevices.getUserMedia({audio: true});
  recorder = new MediaRecorder(stream);
  chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => process(new Blob(chunks, {type: 'audio/webm'}));
  recorder.start();
  recording = true;
  btn.classList.add('recording');
  btn.textContent = '⏹ Stop and analyze';
});

async function process(blob) {
  recording = false;
  btn.classList.remove('recording');
  btn.textContent = '🎙️ Click to record';
  btn.disabled = true;
  document.getElementById('transcript').textContent = 'Transcribing...';

  const analysis_type = document.querySelector('input[name=analysis]:checked').value;
  const fd = new FormData();
  fd.append('file', blob, 'recording.webm');
  fd.append('analysis_type', analysis_type);

  try {
    const r = await fetch('/pipeline', {method: 'POST', body: fd});
    const data = await r.json();
    document.getElementById('transcript').textContent = data.transcript?.text || '(no text)';
    document.getElementById('analysis').textContent = JSON.stringify(data.analysis, null, 2);
  } catch (err) {
    document.getElementById('transcript').textContent = `Error: ${err}`;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
