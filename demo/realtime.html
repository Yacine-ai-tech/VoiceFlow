<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VoiceFlow Realtime Demo</title>
<style>
body { background:#0f172a; color:#f1f5f9; font:14px/1.5 system-ui; margin:0; padding:32px; }
.box { background:#1e293b; border:1px solid #334155; padding:16px; border-radius:8px; }
button { background:#6366f1; color:#fff; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; }
</style>
</head>
<body>
<h1>VoiceFlow Realtime (OpenAI Realtime API bridge)</h1>
<p>Connects to <code>/realtime</code> WebSocket. Production: relay to OpenAI Realtime over WebRTC for voice-agent demo.</p>

<div class="box">
  <button id="connect">Connect</button>
  <button id="send">Send test</button>
  <pre id="log">—</pre>
</div>

<script>
let ws;
document.getElementById('connect').onclick = () => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/realtime`);
  ws.onmessage = (e) => {
    document.getElementById('log').textContent += '\n' + e.data;
  };
  ws.onopen = () => document.getElementById('log').textContent = 'connected';
};
document.getElementById('send').onclick = () => ws && ws.send('hello realtime');
</script>
</body>
</html>
